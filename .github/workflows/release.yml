---
name: release

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 18 * * 0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build per-agent, per-language-toolchain images
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        agent: [claude, gemini, kilocode, opencode, crush, codex, qwen-code]
        language_toolchain: [rust, go, python, node]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.agent }}-${{ matrix.language_toolchain }}-main
            type=raw,value=${{ matrix.agent }}-${{ matrix.language_toolchain }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            RELEASE=true
            AGENT=${{ matrix.agent }}
            LANG_TOOLCHAIN=${{ matrix.language_toolchain }}
            TARGETPLATFORM=linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build omnibus images (all language toolchains combined per agent)
  build-omnibus:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        agent: [claude, gemini, kilocode, opencode, crush, codex, qwen-code]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.agent }}-omnibus-main
            type=raw,value=${{ matrix.agent }}-omnibus

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.omnibus
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            RELEASE=true
            AGENT=${{ matrix.agent }}
            TARGETPLATFORM=linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
